backend:
  name: git-gateway
  branch: main

media_folder: "public/assets"
public_folder: "/assets"

locale: de

collections:
  - name: "angebote"
    label: "Aktuelle Angebote"
    description: "Hier kannst du die 3 Angebots-Bilder jeden Monat tauschen."
    files:
      - name: "angebote"
        label: "Angebots-Bilder"
        file: "src/content/angebote/angebote.md"
        fields:
          - label: "Angebot 1 (Hauptangebot)"
            name: "angebot1"
            widget: "image"
            required: false
            hint: "JPG oder PNG, max. 5 MB"
          - label: "Angebot 2"
            name: "angebot2"
            widget: "image"
            required: false
            hint: "JPG oder PNG, max. 5 MB"
          - label: "Angebot 3"
            name: "angebot3"
            widget: "image"
            required: false
            hint: "JPG oder PNG, max. 5 MB"

  - name: "galerie"
    label: "Kunden-Galerie"
    description: "Hier kannst du Kundenfotos und Gerichte für die Galerie-Seite pflegen."
    files:
      - name: "galerie"
        label: "Galerie-Einträge"
        file: "src/content/galerie/galerie.md"
        fields:
          - label: "Gerichte"
            name: "gerichte"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - label: "Gerichtsname"
                name: "name"
                widget: "string"
                hint: "z.B. Risotto alla Milanese"
              - label: "Kundenkommentar"
                name: "kommentar"
                widget: "string"
                required: false
                hint: "Optionaler kurzer Kommentar vom Kunden"
              - label: "Foto"
                name: "bild"
                widget: "image"
                required: false
                hint: "JPG oder PNG, querformat empfohlen"

  - name: "katalog"
    label: "Gastgeber-Katalog"
    description: "Hier kannst du den aktuellen Katalog als PDF hochladen."
    files:
      - name: "katalog"
        label: "Katalog-Datei"
        file: "src/content/katalog/katalog.md"
        fields:
          - label: "Aktueller Katalog (PDF)"
            name: "pdf"
            widget: "file"
            required: false
            hint: "PDF-Datei, max. 20 MB"
          - label: "Gültig bis"
            name: "gueltig_bis"
            widget: "string"
            required: false
            hint: "z.B. März 2026 oder 29.03.2026"
